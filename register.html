<!DOCTYPE html>
<html>
<head>
  <title>Farmer Register - AgroSense</title>

  <style>
    body{
      font-family:'Segoe UI';
      background:#f4f7f3;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box{
      background:white;
      padding:25px;
      border-radius:12px;
      width:300px;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    input{
      width:100%;
      margin:8px 0;
      padding:10px;
      border-radius:6px;
      border:1px solid #ccc;
    }

    button{
      width:100%;
      padding:10px;
      background:#1f6012;
      color:white;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    p{
      text-align:center;
    }

    a{
      color:#1f6012;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div class="box">

  <h2>👨‍🌾 Farmer Register</h2>

  <input id="userId" placeholder="User ID">
  <input id="password" type="password" placeholder="Password" minlength="6">

  <input id="farmName" placeholder="Farm Name">
  <input id="location" placeholder="Location">
  <input id="cropType" placeholder="Crop Type">
  <input id="landSize" placeholder="Land Size (acre)">

  <button onclick="register()">Register</button>

  <p id="msg"></p>

  <p>Already have account?  
    <a onclick="goLogin()">Login</a>
  </p>

</div>

<script>

async function register(){

  const userId = document.getElementById("userId").value.trim();
  const password = document.getElementById("password").value.trim();

  const farmName = document.getElementById("farmName").value;
  const location = document.getElementById("location").value;
  const cropType = document.getElementById("cropType").value;
  const landSize = document.getElementById("landSize").value;

  // 🔴 PASSWORD VALIDATION
  if(password.length < 6){
    document.getElementById("msg").innerText = "⚠ Password must be at least 6 characters";
    return;
  }

  const payload = {
    userId,
    password,
    farmName,
    location,
    cropType,
    landSize
  };

  try{
    const res = await fetch("https://fsdbackend-ev5d.onrender.com/api/auth/register",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify(payload)
    });

    const data = await res.json();

    if(data.success){
      document.getElementById("msg").innerText = "✅ Registered successfully";
      setTimeout(()=> window.location.href="login.html",1500);
    }else{
      document.getElementById("msg").innerText = "❌ " + (data.message || "Error");
    }

  }catch(err){
    document.getElementById("msg").innerText = "⚠ Server error";
  }
}

function goLogin(){
  window.location.href = "login.html";
}

</script>

</body>
</html>
